<!-- 
    Um esqueleto de um site deve conter:
        1. HEADER
        2. HERO
        3. Content
        4. SIDE BAR
        5. FOOTER
-->

<!DOCTYPE html>
<html lang="pt-br">

<!-- CABEÇALHO: -->
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />

    <title>Instagram Project</title>
</head>

<body>

    <!-- Div TOTAL-->
    <div id="wrapper">

        <!-- CONTAINER:-->
        <div id="container">

            <!-- ÁREA ESQUERDA -->
            <div class="column left"></div>
                <div class="main">

                </div>
            
            <!-- ÁREA DIREITA -->
            <div class="column right">

                <div class="login-panel">

                    <div class="logo-img">
                        <img src="./insta/assets/insta.png" alt="logo_img" width="150" height="150" >
                    </div>

                    <form >
                        <input placeholder="Telefone, usuário ou e-mail" type="text" name="username"/>
                        <input placeholder="Senha" type="password" name="password"/><br>
                        <input type="submit" value="Entrar"/>
                    </form>

                </div>

            </div>


        </div>



    </div>




</body>

</html>
